name: Update HyDE Themes

on:
  workflow_dispatch: # Allows manual triggering
  schedule:
    - cron: "0 0 * * *" # Run daily at midnight UTC

jobs:
  update-themes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0 # Fetch all history for auto-merge

      - name: Setup Nix
        uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31.10.1
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run update script
        run: |
          ./scripts/update-themes.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(themes): automated theme updates"
          title: "chore(themes): Automated HyDE Theme Updates"
          body: |
            This PR updates the `sha256` for HyDE themes based on their specified `rev`.
            Automated by GitHub Actions.
          branch: automated-theme-updates
          delete-branch: true
          labels: |
            automated
            themes
          add-paths: "pkgs/hydenix-themes/*.nix"

      - name: Enable Auto-merge
        if: steps.create_pr.outputs.pull-request-number
        run: |
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge --auto --rebase "$PR_NUMBER"
          else
            echo "::warning:: No pull request was created. Auto-merge skipped."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
