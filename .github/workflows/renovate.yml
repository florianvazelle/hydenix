name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0" # weekly

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  renovate-local:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Renovate
        uses: renovatebot/github-action@7b4b65bf31e07d4e3e51708d07700fb41bc03166 # v64.1.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          configurationFile: .github/renovate.json
          docker-cmd-file: .github/renovate-entrypoint.sh
          docker-user: root
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: "false"
          RENOVATE_ALLOWED_COMMANDS: "^nix run github:Mic92/nix-update"
          LOG_LEVEL: debug
