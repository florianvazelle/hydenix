name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0" # weekly
  pull_request:
    paths:
      - .github/renovate.json
      - .github/renovate-entrypoint.sh

permissions: {}

jobs:
  renovate-config-validator:
    runs-on: ubuntu-latest
    if: ${{ github.event.issue.pull_request }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31.10.1
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Validate renovate config
        run: nix-shell -p renovate --run "renovate-config-validator"

  renovate-local:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Sets env var for dry-run
        if: ${{ github.event.issue.pull_request }}
        run: echo "RENOVATE_DRY_RUN=full" >> $GITHUB_ENV

      - name: Renovate
        uses: renovatebot/github-action@7b4b65bf31e07d4e3e51708d07700fb41bc03166 # v64.1.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          configurationFile: .github/renovate.json
          docker-cmd-file: .github/renovate-entrypoint.sh
          docker-user: root
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: "false"
          RENOVATE_ALLOWED_COMMANDS: "^nix run github:Mic92/nix-update"
          LOG_LEVEL: debug
          RENOVATE_DRY_RUN: ${{ env.RENOVATE_DRY_RUN }}
